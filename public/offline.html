<!doctype html>
<html lang="en-PK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Wedding Wala</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: linear-gradient(180deg, #fdf9f2 0%, #f5ecdc 100%);
        color: #2a2118;
      }
      .wrap {
        max-width: 460px;
        margin: 0 auto;
        padding: 24vh 24px 24px;
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff;
        border: 1px solid rgba(184, 140, 74, 0.3);
        color: #8a6630;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      h1 {
        font-size: 22px;
        margin: 16px 0 8px;
        color: #6a4920;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #594832;
        margin: 0 0 16px;
      }
      a.btn {
        display: inline-block;
        background: #b88c4a;
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
      }
      a.btn:hover {
        background: #a07734;
      }
      .footer {
        margin-top: 36px;
        font-size: 11px;
        color: #a08a6b;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="badge">Offline</span>
      <h1>No internet right now</h1>
      <p>
        The Wedding Wala app is offline. We&rsquo;ll reconnect automatically the
        moment your connection is back. Anything you&rsquo;ve already loaded is
        still cached and viewable.
      </p>
      <a class="btn" href="/dashboard/today">Open Today view</a>
      <div class="footer">
        Wedding Wala &middot; weddingwala.pk
      </div>
    </div>
    <script>
      // Auto-retry once the browser detects connectivity.
      window.addEventListener("online", () => {
        location.reload();
      });
    </script>
  </body>
</html>
